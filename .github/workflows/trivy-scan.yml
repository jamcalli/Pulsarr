name: Trivy Container Vulnerability Scan

on:
  schedule:
    - cron: '50 7 * * 5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Scan ${{ matrix.tag }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        tag: [latest, node]
    env:
      TRIVY_CACHE_DIR: .trivycache
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .trivycache
          key: trivy-${{ runner.os }}-${{ hashFiles('**/Dockerfile', '**/dockerfile.node') }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: lakker/pulsarr:${{ matrix.tag }}
          version: v0.71.0
          format: sarif
          output: trivy-scheduled-${{ matrix.tag }}.sarif
          ignore-unfixed: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: trivy-scheduled-${{ matrix.tag }}.sarif
          category: trivy-scheduled-${{ matrix.tag }}
