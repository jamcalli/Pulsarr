name: Trivy Security Scan

on:
  push:
    branches: [master, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [master, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  schedule:
    - cron: '50 7 * * 5'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trivy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deps:
    name: Scan dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      TRIVY_CACHE_DIR: .trivycache
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Cache Trivy DB
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: .trivycache
          key: trivy-fs-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            trivy-fs-${{ runner.os }}-

      - name: Run Trivy dependency scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          skip-dirs: docs
          version: v0.72.0
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-deps.sarif

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-deps

  image:
    name: Scan ${{ matrix.tag }} image
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        tag: [latest, node]
    env:
      TRIVY_CACHE_DIR: .trivycache
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Cache Trivy DB
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: .trivycache
          key: trivy-${{ runner.os }}-${{ hashFiles('**/Dockerfile', '**/dockerfile.node') }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: lakker/pulsarr:${{ matrix.tag }}
          version: v0.72.0
          format: sarif
          output: trivy-scheduled-${{ matrix.tag }}.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore.yaml

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-scheduled-${{ matrix.tag }}.sarif
          category: trivy-scheduled-${{ matrix.tag }}
