name: Build and Test
on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Cache Vitest
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: node_modules/.vite
          key: vitest-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            vitest-${{ runner.os }}-
      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Biome
        run: biome ci .
      - name: TypeScript Check - Server
        run: tsc --noEmit
      - name: TypeScript Check - Client
        run: tsc --noEmit -p src/client/tsconfig.json
      - name: Run Tests
        run: bun run test
      - name: Build
        run: bun run build
